name: Build Android APK

# Runs when you click "Run workflow" in the Actions tab,
# and automatically whenever files are pushed/uploaded to the main branch.
on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JavaScript dependencies
        run: npm install

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk TM-Health.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TM-Health-APK
          path: TM-Health.apk

      - name: Publish APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: TM Health (latest build)
          body: >
            Latest TM Health APK. Tap **TM-Health.apk** below on your Android
            phone to download and install it.
          files: TM-Health.apk
